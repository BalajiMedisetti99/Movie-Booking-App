spring.application.name=Api-Gateway

server.port = 9090
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Booking Service
springdoc.swagger-ui.urls[0].url=http://localhost:1111/v3/api-docs

springdoc.swagger-ui.urls[1].name=Customer Service
springdoc.swagger-ui.urls[1].url=http://localhost:2222/v3/api-docs

springdoc.swagger-ui.urls[2].name=Movie Service
springdoc.swagger-ui.urls[2].url=http://localhost:3333/v3/api-docs

springdoc.swagger-ui.urls[3].name=Theater Service
springdoc.swagger-ui.urls[3].url=http://localhost:4444/v3/api-docs