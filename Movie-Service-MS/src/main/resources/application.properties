spring.application.name=Movie-Service-MS

server.port = 3333

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost

spring.datasource.url=jdbc:mysql://localhost:3306/movie_service_ms
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


springdoc.swagger-ui.path=/swagger-ui-custom.html
springdoc.swagger-ui.operationsSorter=method

techacademy.openapi.dev-url=http://localhost:3333
techacademy.openapi.prod-url=https://xxx-api.com

# Zipkin endpoint (default port 9411)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
 
# Sampling probability (1.0 = 100% of requests traced)
management.tracing.sampling.probability=1.0
 
# Enable distributed tracing with Brave
management.tracing.enabled=true